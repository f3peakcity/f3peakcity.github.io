name: Refresh Who2Q data

on:
  schedule:
    - cron: '0 10 * * 0'   # Sundays 10:00 UTC (~6am ET)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements-who2q.txt

      - name: Run unit tests
        run: python -m unittest discover -s scripts/tests -v

      - name: Create BQ credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: echo "$GCP_SA_KEY" > bq_credentials.json

      - name: Generate who2q.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: bq_credentials.json
          GOOGLE_CLOUD_PROJECT: f3data
        run: python scripts/who2q_export.py

      - name: Clean up credentials
        if: always()
        run: rm -f bq_credentials.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/stats/data/who2q.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(who2q): weekly data refresh"
            git push
          fi
